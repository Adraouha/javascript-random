<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2 - Intercambio de valores</title>
</head>
<body>
<script>
    let x = 5;
    let y = 8;

    document.write(`La x vale: ${x} y la y vale: ${y} <br>`);

    let aux = x;
    x = y;
    y = aux;

    document.write(`Y ahora, la x vale: ${x} y la y vale: ${y}`);
</script>
    
</body>
</html>
