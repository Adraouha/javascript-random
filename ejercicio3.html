<html>
<head>
    <title>Ejercicio 3 - Tablas de multiplicar</title>
</head>
<body>

<script>

for (let i = 1; i <= 10; i++) {

    document.write("<h3>Tabla del " + i + "</h3>");

    for (let j = 0; j <= 10; j++) {

        document.write(
            i + " x " + j + " = " + (i * j) + "<br>"
        );
    }

    document.write("<hr>");
}

</script>

</body>
</html>
